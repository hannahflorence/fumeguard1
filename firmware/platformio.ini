[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Set your ESP32 USB port from Device Manager (e.g. COM3, COM4) — uncomment one line:
upload_port = COM5
monitor_port = COM5
; Slower upload helps flaky USB — raise to 460800 after first success
upload_speed = 115200
; Let CP210x toggle EN + GPIO0 (do not hold BOOT during upload on most DevKit boards)
; Avoid monitor auto-reset fighting upload (close Serial Monitor before Upload)
monitor_rts = 0
monitor_dtr = 0
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.3.0
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
build_flags =
    -DCORE_DEBUG_LEVEL=1

; If auto-upload still fails: PlatformIO env selector → esp32dev_manual, then use BOOT+EN
; sequence in docs/ESP32_CONNECTION_GUIDE.md (do not hold BOOT while dots print).
[env:esp32dev_manual]
extends = env:esp32dev
upload_flags =
    --before=no_reset
    --after=hard_reset

